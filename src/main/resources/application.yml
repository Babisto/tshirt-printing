spring:
  application:
    name: stock-management
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/tshirt_stock}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    secret: ${APP_JWT_SECRET:change-this-secret-key-change-this-secret-key}
    expiration-ms: ${APP_JWT_EXPIRATION_MS:86400000}
  bootstrap:
    admin-email: ${APP_ADMIN_EMAIL:admin@tshirt.local}
    admin-password: ${APP_ADMIN_PASSWORD:Admin@123}
    staff-email: ${APP_STAFF_EMAIL:staff@tshirt.local}
    staff-password: ${APP_STAFF_PASSWORD:Staff@123}

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.tshirtprinting.stockmanagement: INFO
